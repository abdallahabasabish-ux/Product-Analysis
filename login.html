<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - NilePush</title>
    <!-- خط Cairo المصري -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- ملف التصميم الموحد -->
    <link rel="stylesheet" href="css/style.css">
    <!-- المكتبة الأساسية -->
    <script src="js/app.js" defer></script>
    <style>
        /* تنسيق خاص بصفحة الدخول فقط */
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #CE1126 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: #FFFFFF;
            border-radius: 32px;
            padding: 50px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            border-top: 8px solid #C9A84C;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .logo i { color: #CE1126; }
        .logo span { font-weight: 800; color: #1a1a1a; }
        .logo .gold { color: #C9A84C; }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 5px; color: #1a1a2e; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .form-control {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #eee;
            border-radius: 16px;
            font-family: 'Cairo', sans-serif;
            margin-bottom: 15px;
            transition: 0.3s;
            box-sizing: border-box;
        }
        .form-control:focus {
            border-color: #C9A84C;
            outline: none;
            box-shadow: 0 0 0 4px rgba(201, 168, 76, 0.2);
        }
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #CE1126, #8B0000);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(206, 17, 38, 0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .footer-note { margin-top: 25px; color: #888; font-size: 14px; }
        .footer-note i { color: #C9A84C; }
        .gold-divider { border: none; height: 2px; background: linear-gradient(to right, transparent, #C9A84C, transparent); margin: 20px 0; }
        #messageBox { color: #CE1126; margin-bottom: 15px; font-weight: 600; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-bell"></i> <span>Nile</span><span class="gold">Push</span>
        </div>
        <h1>مرحباً بعودتك</h1>
        <p class="subtitle">منصة الإشعارات الفورية للمدونين المصريين</p>

        <div id="messageBox"><i class="fas fa-info-circle"></i> <span id="messageText"></span></div>

        <form id="loginForm">
            <input type="email" id="emailInput" class="form-control" placeholder="البريد الإلكتروني" required dir="ltr">
            <input type="text" id="nameInput" class="form-control" placeholder="الاسم (اختياري)">
            <button type="submit" class="btn-primary" id="loginBtn">
                <i class="fas fa-key"></i> دخول
            </button>
        </form>

        <hr class="gold-divider">
        <p class="footer-note"><i class="fas fa-shield-alt"></i> سيتم إنشاء حسابك تلقائياً عند أول تسجيل دخول</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // إذا كان مسجلاً، يذهب للوحة
            if (window.app && window.app.isLoggedIn()) {
                window.location.href = 'index.html';
                return;
            }

            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('emailInput');
            const nameInput = document.getElementById('nameInput');
            const btn = document.getElementById('loginBtn');
            const msgBox = document.getElementById('messageBox');
            const msgText = document.getElementById('messageText');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';
                msgBox.style.display = 'none';

                const email = emailInput.value.trim();
                const name = nameInput.value.trim();

                if (!email) {
                    msgText.textContent = 'الرجاء إدخال البريد الإلكتروني';
                    msgBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-key"></i> دخول';
                    return;
                }

                try {
                    const user = await window.app.login(email, name);
                    msgText.textContent = 'مرحباً ' + (user.displayName || user.email) + '! جاري التوجيه...';
                    msgBox.style.color = '#28a745';
                    msgBox.style.display = 'block';
                    setTimeout(() => { window.location.href = 'index.html'; }, 1000);
                } catch (err) {
                    msgText.textContent = err.message || 'حدث خطأ غير متوقع';
                    msgBox.style.color = '#CE1126';
                    msgBox.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-key"></i> دخول';
                }
            });
        });
    </script>
</body>
</html>
